<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Debales Webhook Engine - Admin</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Debales Webhook Automation Engine</h1>
    <div class="tenant-picker">
      <label for="tenant-select">Logged in as tenant:</label>
      <select id="tenant-select"></select>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="jobs">Jobs</button>
    <button class="tab-btn" data-tab="events">Events</button>
    <button class="tab-btn" data-tab="rules">Rules</button>
  </nav>

  <main>
    <section id="tab-jobs" class="tab-panel active">
      <h2>Job Runs <span class="hint">(auto-refreshes every 2s)</span></h2>
      <table>
        <thead>
          <tr>
            <th>Status</th><th>Event Type</th><th>Source</th><th>Attempts</th>
            <th>Rules Matched</th><th>Error</th><th>Updated</th><th></th>
          </tr>
        </thead>
        <tbody id="jobs-body"></tbody>
      </table>
    </section>

    <section id="tab-events" class="tab-panel">
      <h2>Webhook Events <span class="hint">(auto-refreshes every 2s)</span></h2>
      <table>
        <thead>
          <tr><th>Status</th><th>Source</th><th>Event Type</th><th>External ID</th><th>Received</th></tr>
        </thead>
        <tbody id="events-body"></tbody>
      </table>
    </section>

    <section id="tab-rules" class="tab-panel">
      <h2>Automation Rules</h2>
      <table>
        <thead>
          <tr><th>Active</th><th>Name</th><th>Source</th><th>Event Type</th><th>Conditions</th><th>Actions</th></tr>
        </thead>
        <tbody id="rules-body"></tbody>
      </table>
    </section>
  </main>

  <div id="detail-modal" class="modal hidden">
    <div class="modal-content">
      <button id="modal-close">&times;</button>
      <pre id="modal-body"></pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
